<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Consolidado de Pagos de Préstamos</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    button { padding: 0.5rem 1rem; margin-bottom: 1rem; }
    pre { background:#f5f5f5; padding:1rem; overflow:auto; }
  </style>
</head>
<body>
  <h1>Consolidado de Pagos de Préstamos</h1>
  <button id="loadBtn">Mostrar consolidado</button>
  <pre id="output">[cargando...]</pre>
  <script>
    // Intenta obtener token del localStorage (el mismo que usa la app)
    const getToken = () => {
      const possibleKeys = ['token','authToken','jwt','accessToken'];
      for (const k of possibleKeys) {
        const v = localStorage.getItem(k);
        if (v) return v;
      }
      return null;
    };
    document.getElementById('loadBtn').addEventListener('click', async () => {
      let token = getToken();
      if (!token) {
        token = prompt('Ingrese su token JWT (admin/tesorero)');
      }
      if (!token) {
        alert('Token requerido');
        return;
      }
      try {
        const resp = await fetch('/api/v1/loan-payments', {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!resp.ok) {
          const err = await resp.json();
          document.getElementById('output').textContent = `Error ${resp.status}: ${JSON.stringify(err)}`;
          return;
        }
        const data = await resp.json();
        document.getElementById('output').textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById('output').textContent = 'Error: ' + e.message;
      }
    });
    // Cargar automáticamente al abrir la página (opcional)
    // document.getElementById('loadBtn').click();
  </script>
</body>
</html>
