<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend4</title>
    <script type="module" crossorigin src="/assets/index-D1IqGZd8.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CeUOPdxQ.css">
  </head>
  <body>
    <div id="root"></div>
    <!-- Botón para acceso rápido al consolidado de pagos de préstamos -->
    <a href="/loan-payments.html" id="consolidadoBtn" style="display:none; margin:0;">
      <button type="button">Ver consolidado de pagos de préstamos</button>
    </a>
  <script>
    const toggleConsolidadoBtn = () => {
      const btn = document.getElementById('consolidadoBtn');
      if (!btn) return;
      // Delay to allow React to render the new view
setTimeout(() => {
          const show = !!document.querySelector('button[class*="bg-blue-600/10"]');
          btn.style.display = show ? 'block' : 'none';
          if (show) {
            const newLoanBtn = Array.from(document.querySelectorAll('button')).find(b => b.textContent && b.textContent.includes('Nuevo Préstamo'));
            if (newLoanBtn && !newLoanBtn.nextElementSibling?.id?.includes('consolidadoBtn')) {
              newLoanBtn.parentNode.insertBefore(btn, newLoanBtn.nextSibling);
            }
          }
        }, 500);
    };
    // Initial check
    toggleConsolidadoBtn();
    // Listen to history changes (popstate covers back/forward)
    window.addEventListener('popstate', toggleConsolidadoBtn);
    // Monkey‑patch pushState / replaceState to fire events for client‑side navigation
    const _push = history.pushState;
    const _replace = history.replaceState;
    history.pushState = function(state, title, url) {
      const result = _push.apply(this, arguments);
      window.dispatchEvent(new Event('pushstate'));
      window.dispatchEvent(new Event('locationchange'));
      return result;
    };
    history.replaceState = function(state, title, url) {
      const result = _replace.apply(this, arguments);
      window.dispatchEvent(new Event('replacestate'));
      window.dispatchEvent(new Event('locationchange'));
      return result;
    };
    window.addEventListener('pushstate', toggleConsolidadoBtn);
    window.addEventListener('replacestate', toggleConsolidadoBtn);
window.addEventListener('locationchange', toggleConsolidadoBtn);
    // Periodic check in case navigation doesn't trigger events
    setInterval(toggleConsolidadoBtn, 1000);
    </script>
</body>
</html>
